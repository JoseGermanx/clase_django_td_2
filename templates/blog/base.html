<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog de ejemplo{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a  href="{% url 'post_list'%}" class="navbar-brand mb-0 h1">El Blog de Python</a>
    <ul class="d-flex">
        <li class="nav-item">
          <a class="nav-link text-white active" aria-current="page" href="{% url 'post_create'%}">Nuevo Post</a>
        </li>
        {% if user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link text-white active" aria-current="page" href="{% url 'profile'%}">Mi perfil</a>
        </li>
        <li class="nav-item">
          <form method="post" action="{% url 'logout'%}">{% csrf_token %}<button type="submit" class="btn btn-danger">Logout</button></form>
        </li>
          {% else %}
        <li class="nav-item">
          <a class="nav-link text-white" href="{% url 'login'%}">Login</a>
        </li>
          {% endif %}
        </li>
        </ul>
  </div>
</nav>
    <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>
</body>

</html>
